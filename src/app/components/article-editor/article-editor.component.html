<div class="editor-container">
  <header class="header">
    <h1>{{ isEditMode ? 'Редактирование статьи' : 'Новая статья' }}</h1>
    <a routerLink="/" class="btn btn-secondary">Назад к списку</a>
  </header>

  <form (ngSubmit)="save()" class="editor-form">
    <div class="form-group">
      <label for="title">Заголовок</label>
      <input
        id="title"
        type="text"
        [(ngModel)]="title"
        name="title"
        placeholder="Введите заголовок статьи"
        class="form-control"
      />
    </div>

    <div class="form-group">
      <label for="content">Содержание</label>
      <textarea
        id="content"
        [(ngModel)]="content"
        name="content"
        placeholder="Введите текст статьи"
        rows="20"
        class="form-control textarea"
      ></textarea>
    </div>

    <div class="form-actions">
      <button type="button" (click)="cancel()" class="btn btn-secondary">Отмена</button>
      <button type="submit" class="btn btn-primary">Сохранить</button>
    </div>
  </form>
</div>
