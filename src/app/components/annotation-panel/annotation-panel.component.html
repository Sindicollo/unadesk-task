<div class="annotation-panel" [class.open]="isOpen()">
  <div class="panel-header">
    <h3>{{ title }}</h3>
    <button type="button" class="btn-close" (click)="onCancel()" title="Закрыть">×</button>
  </div>

  <div class="panel-content">
    <div class="form-group">
      <label>Цвет</label>
      <div class="color-dropdown">
        <select
          [ngModel]="selectedColor()"
          (ngModelChange)="onColorSelect($event)"
          class="form-control color-select"
        >
          @for (option of colorOptions; track option.value) {
            <option [value]="option.value">
              {{ option.label }}
            </option>
          }
        </select>
        <div class="color-preview" [class]="selectedColor()"></div>
      </div>
      <div class="color-grid">
        @for (option of colorOptions; track option.value) {
          <button
            type="button"
            class="color-swatch"
            [class.selected]="option.value === selectedColor()"
            [class]="option.value"
            [title]="option.label"
            (click)="onColorSelect(option.value)"
          ></button>
        }
      </div>
    </div>

    <div class="form-group">
      <label for="annotation-text">Текст аннотации</label>
      <textarea
        id="annotation-text"
        [ngModel]="annotationText()"
        (ngModelChange)="onTextChange($event)"
        placeholder="Введите примечание к выделенному тексту"
        rows="5"
        class="form-control textarea"
      ></textarea>
    </div>

    @if (selectedAnnotation()) {
      <div class="annotation-actions">
        <button type="button" class="btn btn-danger" (click)="onDelete()">
          Удалить аннотацию
        </button>
      </div>
    }

    <div class="panel-actions">
      <button type="button" class="btn btn-secondary" (click)="onCancel()">
        Отмена
      </button>
      <button type="button" class="btn btn-primary" (click)="onSave()">
        {{ saveButtonText }}
      </button>
    </div>
  </div>
</div>
